<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Расчёт поставщиков</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f1923; color: #e8e0d4; font-family: 'Inter', sans-serif; min-height: 100vh; }

.header { background: #162230; border-bottom: 1px solid #1e3048; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
.header-title { font-size: 18px; font-weight: 700; }
.header-sub { font-size: 10px; color: #4a7fa5; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2px; }
.tabs { display: flex; gap: 6px; }
.tab { padding: 6px 14px; border-radius: 8px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; }
.tab.active { background: #1a6b9e; color: #fff; }
.tab.inactive { background: #1e3048; color: #7aa8c4; }

.container { max-width: 700px; margin: 0 auto; padding: 16px; }
.card { background: #162230; border-radius: 12px; padding: 14px; margin-bottom: 14px; border: 1px solid #1e3048; }
.card-label { font-size: 11px; color: #4a7fa5; margin-bottom: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
.upload-btn { width: 100%; padding: 11px; border-radius: 8px; border: 2px dashed #1e3a54; background: transparent; color: #4a7fa5; font-size: 14px; cursor: pointer; margin-bottom: 10px; }
.empty-msg { color: #3d6480; font-size: 13px; text-align: center; padding: 6px 0; }
.file-item { background: #1a2d3e; border-radius: 10px; padding: 11px; margin-bottom: 8px; }
.file-item-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.file-name { font-size: 12px; color: #a8c8e0; }
.remove-btn { background: none; border: none; color: #4a6880; cursor: pointer; font-size: 18px; }
.shop-selector { display: flex; gap: 6px; flex-wrap: wrap; }
.shop-btn { padding: 5px 12px; border-radius: 6px; border: 1px solid #1e3a54; background: transparent; color: #4a7fa5; font-size: 12px; cursor: pointer; }
.shop-btn.selected { background: #1a6b9e; border-color: #1a6b9e; color: #fff; font-weight: 600; }
.shop-hint { font-size: 11px; color: #e88060; margin-top: 6px; }

.calc-btn { width: 100%; padding: 13px; border-radius: 10px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; margin-bottom: 18px; }
.calc-btn.ready { background: linear-gradient(135deg, #1a6b9e, #0f4d75); color: #fff; }
.calc-btn.disabled { background: #1e3048; color: #3d6480; cursor: not-allowed; }
.error { background: #2d1a1a; border: 1px solid #6b2d2d; border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; color: #e88080; font-size: 13px; }

/* RESULTS TABLE */
.week-block { margin-bottom: 20px; }
.week-label { font-size: 11px; color: #4a7fa5; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: 600; }

.result-table { width: 100%; border-collapse: collapse; border-radius: 10px; overflow: hidden; }
.result-table th { background: #1a2d3e; color: #7aa8c4; font-size: 11px; font-weight: 600; padding: 9px 10px; text-align: right; border-bottom: 1px solid #1e3048; }
.result-table th:first-child { text-align: left; }
.result-table td { padding: 0; border-bottom: 1px solid #111d27; }

.sup-row { display: grid; grid-template-columns: 1fr 90px 90px 90px 95px; gap: 0; cursor: pointer; transition: background 0.1s; }
.sup-row:hover { background: #1a2d3e; }
.sup-row td, .sup-cell { padding: 10px 10px; font-size: 13px; }
.sup-name { color: #c8dff0; font-weight: 600; }
.sup-chorsu { color: #7abde8; text-align: right; }
.sup-kadysh { color: #a8d4a8; text-align: right; }
.sup-samark { color: #e8c87a; text-align: right; }
.sup-total { color: #fff; font-weight: 700; text-align: right; }
.sup-zero { color: #2a4060; text-align: right; }

.total-row { background: #1e3a20 !important; }
.total-row .sup-name { color: #8ab870; font-weight: 700; font-size: 13px; }
.total-row .sup-chorsu { color: #7abde8; font-weight: 700; }
.total-row .sup-kadysh { color: #a8d4a8; font-weight: 700; }
.total-row .sup-samark { color: #e8c87a; font-weight: 700; }
.total-row .sup-total { color: #ffd760; font-weight: 800; font-size: 14px; }

/* DETAIL PANEL */
.detail-panel { background: #0d1a26; border-top: none; display: none; }
.detail-panel.open { display: block; }
.detail-header { display: grid; grid-template-columns: 70px 1fr 70px 70px 70px 80px; gap: 4px; padding: 7px 10px; background: #162230; border-top: 1px solid #1e3048; }
.detail-header span { font-size: 10px; color: #4a7fa5; font-weight: 600; text-transform: uppercase; }
.detail-header span:not(:first-child) { text-align: right; }
.detail-item { display: grid; grid-template-columns: 70px 1fr 70px 70px 70px 80px; gap: 4px; padding: 7px 10px; border-top: 1px solid #0f1923; font-size: 12px; }
.detail-item:hover { background: #162230; }
.di-code { color: #4a7fa5; font-family: monospace; }
.di-name { color: #8ab0c8; font-size: 11px; }
.di-qty { color: #7aa8c4; text-align: right; }
.di-chorsu { color: #7abde8; text-align: right; }
.di-kadysh { color: #a8d4a8; text-align: right; }
.di-samark { color: #e8c87a; text-align: right; }
.di-sum { color: #c8dff0; font-weight: 600; text-align: right; }
.di-zero { color: #1e3048; text-align: right; }

.grand-banner { background: linear-gradient(135deg, #0f4d75, #1a6b9e); border-radius: 12px; padding: 14px 18px; margin-bottom: 16px; }
.grand-banner-title { font-size: 10px; color: #a8d4f0; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
.grand-banner-row { display: flex; justify-content: space-between; align-items: center; }
.grand-total-sum { font-size: 24px; font-weight: 800; color: #fff; }
.grand-shops { display: flex; gap: 14px; margin-top: 8px; flex-wrap: wrap; }
.grand-shop-item { font-size: 12px; }
.gs-label { color: #7ab8d8; }
.gs-val { color: #fff; font-weight: 700; }

.unknown-block { background: #1e2a1a; border: 1px solid #3d5a30; border-radius: 10px; padding: 12px 14px; margin-top: 10px; }
.unknown-title { color: #8ab870; font-size: 12px; font-weight: 600; margin-bottom: 4px; }
.unknown-codes { color: #6a8a58; font-size: 11px; line-height: 1.8; }

/* Edit tab */
.msg { border-radius: 8px; padding: 9px 12px; margin-bottom: 10px; font-size: 13px; }
.msg.ok { background: #1a2d1a; border: 1px solid #3d6b30; color: #8ab870; }
.msg.err { background: #2d1a1a; border: 1px solid #6b2d2d; color: #e88080; }
.input { padding: 9px 12px; border-radius: 7px; border: 1px solid #1e3a54; background: #0f1923; color: #e8e0d4; font-size: 14px; }
.btn-blue { padding: 9px 14px; border-radius: 7px; border: none; background: #1a6b9e; color: #fff; font-weight: 600; cursor: pointer; font-size: 14px; }
.edit-supplier { background: #162230; border-radius: 10px; margin-bottom: 10px; border: 1px solid #1e3048; overflow: hidden; }
.edit-sup-header { padding: 11px 14px; display: flex; justify-content: space-between; align-items: center; background: #1a2d3e; }
.edit-sup-name { font-weight: 700; font-size: 14px; color: #c8dff0; }
.edit-sup-count { color: #3d6480; font-size: 12px; margin-left: 6px; }
.edit-btns { display: flex; gap: 6px; }
.btn-edit { padding: 5px 10px; border-radius: 6px; border: none; color: #a8c8e0; cursor: pointer; font-size: 12px; }
.btn-del-sup { padding: 5px 9px; border-radius: 6px; border: none; background: #2d1a1a; color: #e88080; cursor: pointer; font-size: 12px; }
.edit-body { padding: 12px; }
.item-row { display: flex; align-items: center; gap: 7px; margin-bottom: 7px; }
.item-code { font-family: monospace; color: #4a7fa5; font-size: 12px; width: 65px; flex-shrink: 0; }
.item-cost-input { flex: 1; padding: 6px 9px; border-radius: 6px; border: 1px solid #1e3a54; background: #0f1923; color: #e8e0d4; font-size: 13px; }
.item-unit { color: #3d6480; font-size: 11px; }
.btn-del-item { padding: 5px 9px; border-radius: 6px; border: none; background: #2d1a1a; color: #e88080; cursor: pointer; font-size: 12px; }
.add-item-section { border-top: 1px solid #1e3048; padding-top: 10px; margin-top: 6px; }
.add-item-label { font-size: 10px; color: #4a7fa5; margin-bottom: 7px; text-transform: uppercase; letter-spacing: 1px; }
.add-item-row { display: flex; gap: 7px; }
.code-input { width: 75px; padding: 7px 9px; border-radius: 6px; border: 1px solid #1e3a54; background: #0f1923; color: #e8e0d4; font-size: 13px; }
.cost-input { flex: 1; padding: 7px 9px; border-radius: 6px; border: 1px solid #1e3a54; background: #0f1923; color: #e8e0d4; font-size: 13px; }
.btn-add-item { padding: 7px 12px; border-radius: 6px; border: none; background: #1a6b9e; color: #fff; font-weight: 700; cursor: pointer; font-size: 14px; }
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="homeScreen" style="min-height:100vh;background:#0f1923;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px">
  <div style="text-align:center;margin-bottom:40px">
    <div style="font-size:11px;color:#4a7fa5;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px">Система отчётов</div>
    <div style="font-size:28px;font-weight:800;color:#e8e0d4">Панель управления</div>
  </div>
  <div style="width:100%;max-width:400px;display:flex;flex-direction:column;gap:14px">
    <button onclick="openReport('suppliers')" style="width:100%;padding:20px;border-radius:14px;border:1px solid #1e3048;background:#162230;color:#e8e0d4;cursor:pointer;text-align:left;">
      <div style="display:flex;align-items:center;gap:14px">
        <div style="width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#1a6b9e,#0f4d75);display:flex;align-items:center;justify-content:center;font-size:22px">📊</div>
        <div>
          <div style="font-size:16px;font-weight:700;color:#c8dff0;margin-bottom:3px">Расчёт поставщиков</div>
          <div style="font-size:12px;color:#4a7fa5">Чорсу • Кадышева • Самарканд</div>
        </div>
      </div>
    </button>
    <button onclick="openReport('bonasera')" style="width:100%;padding:20px;border-radius:14px;border:1px solid #1e3048;background:#162230;color:#e8e0d4;cursor:pointer;text-align:left;">
      <div style="display:flex;align-items:center;gap:14px">
        <div style="width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#9e6b1a,#754d0f);display:flex;align-items:center;justify-content:center;font-size:22px">🏪</div>
        <div>
          <div style="font-size:16px;font-weight:700;color:#f0d8a8;margin-bottom:3px">Продажи Bonasera</div>
          <div style="font-size:12px;color:#8a7040">Согдиана • Узбекистанская • Bonasera Men</div>
        </div>
      </div>
    </button>
  </div>
</div>

<div class="header" id="mainHeader" style="display:none">
  <div style="display:flex;align-items:center;gap:10px">
    <button onclick="goHome()" style="background:none;border:none;color:#4a7fa5;cursor:pointer;font-size:20px;padding:0">←</button>
    <div>
      <div class="header-sub" id="headerSub">Расчёт выплат</div>
      <div class="header-title" id="headerTitle">Поставщики</div>
    </div>
  </div>
  <div class="tabs" id="mainTabs">
    <button class="tab active" onclick="switchTab('calc')" id="tabCalc">Расчёт</button>
    <button class="tab inactive" onclick="switchTab('edit')" id="tabEdit">Товары</button>
  </div>
</div>

<div class="container" id="mainContainer" style="display:none">
  <!-- CALC TAB -->
  <div id="tab-calc">
    <!-- API Section -->
    <div class="card">
      <div class="card-label">🔗 Загрузить из Regos</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <div>
          <div style="font-size:11px;color:#4a7fa5;margin-bottom:4px">Дата начала</div>
          <input type="date" id="apiStartDate" class="input" style="width:100%;font-size:13px;padding:8px"/>
        </div>
        <div>
          <div style="font-size:11px;color:#4a7fa5;margin-bottom:4px">Дата конца</div>
          <input type="date" id="apiEndDate" class="input" style="width:100%;font-size:13px;padding:8px"/>
        </div>
      </div>
      <div id="apiStatus" style="font-size:12px;color:#4a7fa5;min-height:18px;margin-bottom:6px"></div>
      <button onclick="loadAllFromApi()" style="width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,#1a7a3a,#0f5228);color:#fff;font-size:15px;font-weight:700;cursor:pointer;">
        🔄 Загрузить продажи из Regos
      </button>
    </div>

    <div style="text-align:center;color:#2a4060;font-size:12px;margin:0 0 12px">— или загрузите Excel файлы вручную —</div>

    <div class="card">
      <div class="card-label">Файлы Excel из Regos</div>
      <button class="upload-btn" onclick="document.getElementById('fileInput').click()">+ Добавить файл</button>
      <input type="file" id="fileInput" accept=".xlsx,.xls" multiple style="display:none" onchange="handleFiles(this)"/>
      <div id="fileList"><div class="empty-msg">Загрузите отчёты и укажите филиал для каждого</div></div>
    </div>
    <div id="errorMsg" style="display:none" class="error"></div>
    <button id="calcBtn" class="calc-btn disabled" onclick="calculate()">Рассчитать выплаты</button>
    <div id="results"></div>
  </div>

  <!-- EDIT TAB -->
  <div id="tab-edit" style="display:none">
    <div id="editMsg" style="display:none" class="msg ok"></div>
    <div class="card">
      <div class="card-label" style="display:flex;justify-content:space-between;align-items:center">
        <span>Новый поставщик</span>
        <div style="display:flex;gap:6px">
          <button onclick="exportData()" style="padding:5px 10px;border-radius:6px;border:none;background:#1e3a54;color:#7aa8c4;font-size:11px;cursor:pointer">💾 Экспорт</button>
          <button onclick="document.getElementById('importInput').click()" style="padding:5px 10px;border-radius:6px;border:none;background:#1e3a54;color:#7aa8c4;font-size:11px;cursor:pointer">📂 Импорт</button>
          <input type="file" id="importInput" accept=".json" style="display:none" onchange="importData(this)"/>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <input class="input" style="flex:1" id="newSupplierName" placeholder="Имя поставщика"/>
        <button class="btn-blue" onclick="addSupplier()">+</button>
      </div>
    </div>
    <div id="supplierList"></div>
  </div>
</div>

<!-- BONASERA SCREEN -->
<div id="bonaseraScreen" style="display:none">
  <div style="max-width:700px;margin:0 auto;padding:16px">
    <div class="card">
      <div class="card-label">🏪 Продажи Голиб ака шт</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <div>
          <div style="font-size:11px;color:#4a7fa5;margin-bottom:4px">Дата начала</div>
          <input type="date" id="bonStartDate" class="input" style="width:100%;font-size:13px;padding:8px"/>
        </div>
        <div>
          <div style="font-size:11px;color:#4a7fa5;margin-bottom:4px">Дата конца</div>
          <input type="date" id="bonEndDate" class="input" style="width:100%;font-size:13px;padding:8px"/>
        </div>
      </div>
      <div id="bonStatus" style="font-size:12px;color:#4a7fa5;min-height:18px;margin-bottom:6px"></div>
      <button onclick="loadBonasera()" style="width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,#9e6b1a,#754d0f);color:#fff;font-size:15px;font-weight:700;cursor:pointer;">
        🔄 Загрузить продажи Bonasera
      </button>
    </div>
    <div id="bonResults"></div>
  </div>
</div>

<script>
const SHOPS = ["Чорсу", "Кадышева", "Самарканд"];
const SHOP_COLORS = { "Чорсу": "#7abde8", "Кадышева": "#a8d4a8", "Самарканд": "#e8c87a" };

let suppliers = [
  { name: "Али ака", items: [
    {code:"000237",cost:65000},{code:"000314",cost:60000},{code:"000350",cost:50000},
    {code:"000418",cost:70000},{code:"000419",cost:55000},{code:"000420",cost:45000},
    {code:"000491",cost:55000},{code:"000519",cost:55000},{code:"000538",cost:65000},
    {code:"000545",cost:60000},{code:"000573",cost:75000},{code:"000574",cost:65000},
    {code:"000632",cost:95000},{code:"000638",cost:115000},{code:"000649",cost:93000},
    {code:"000683",cost:85000},{code:"000711",cost:165000},{code:"000712",cost:19000},
    {code:"000722",cost:220000},{code:"000724",cost:180000},{code:"000763",cost:85000},
    {code:"000770",cost:60000},{code:"000771",cost:90000},{code:"000777",cost:105000},
    {code:"000790",cost:80000},{code:"000791",cost:185000},{code:"000857",cost:230000},
    {code:"000956",cost:90000},{code:"000998",cost:70000},{code:"001025",cost:16000},
    {code:"001054",cost:65000},{code:"003504",cost:55000},{code:"003552",cost:70000},
    {code:"003602",cost:70000},{code:"003629",cost:19000},{code:"003630",cost:61000},
    {code:"003647",cost:55000},{code:"003653",cost:70000},{code:"003668",cost:60000},
    {code:"003669",cost:85000},{code:"003909",cost:70000},{code:"003978",cost:75000},
    {code:"003996",cost:55000}
  ]},
  { name: "Шавкат ака постель", items: [
    {code:"000444",cost:68000},{code:"000445",cost:53000},
    {code:"003910",cost:68000},{code:"003911",cost:53000}
  ]},
  { name: "Шавкат ака сочик", items: [
    {code:"001096",cost:113000},{code:"004004",cost:113000}
  ] },
  { name: "Шим чорсу", items: [
    {code:"000938",cost:155000},{code:"000939",cost:155000},{code:"000940",cost:130000},
    {code:"000941",cost:130000},{code:"000942",cost:140000},{code:"000943",cost:150000},
    {code:"000944",cost:150000},{code:"000945",cost:150000},{code:"000946",cost:150000},
    {code:"000947",cost:150000},{code:"000948",cost:165000},{code:"000949",cost:165000},
    {code:"000950",cost:165000},{code:"000951",cost:165000},{code:"000952",cost:155000},
    {code:"000953",cost:155000},{code:"000954",cost:155000},{code:"001026",cost:70000}
  ]},
  { name: "Хасанбой", items: [
    {code:"000639",cost:120000},{code:"000650",cost:120000},{code:"000756",cost:120000}
  ]},
  { name: "Жавлон ака Селаник", items: [
    {code:"000865",cost:70000},{code:"000866",cost:75000},{code:"000957",cost:58000}
  ]},
  { name: "Азиз ака Корея", items: [
    {code:"001015",cost:40000},{code:"001024",cost:35000},
    {code:"001027",cost:25000},{code:"001028",cost:20000}
  ]},
  { name: "Комил ака Самарканд", items: [
    {code:"001022",cost:80000},{code:"001023",cost:115000}
  ]},
  { name: "Носиржон ака", items: [
    {code:"001038",cost:105000}
  ]},
  { name: "Шоира опа паплин", items: [
    {code:"001057",cost:60000},{code:"001058",cost:35000},{code:"001059",cost:18000},
    {code:"001060",cost:28000},{code:"001061",cost:75000},{code:"001062",cost:35000},
    {code:"001088",cost:30000},{code:"001106",cost:25000},{code:"001107",cost:30000},
    {code:"003960",cost:60000},{code:"003961",cost:35000},{code:"003962",cost:28000},
    {code:"003963",cost:18000},{code:"003964",cost:75000},{code:"003965",cost:35000}
  ]}
];

let uploadedFiles = [];
let openDetails = {};
let openEditSuppliers = {};

function normalizeCode(raw) {
  if (!raw) return "";
  return String(raw).trim().replace(/^0+/, "").padStart(6, "0");
}
function fmt(n) {
  if (!n) return "";
  return Math.round(n).toLocaleString("ru-RU");
}
function buildLookup() {
  const map = {};
  for (const s of suppliers)
    for (const item of s.items)
      map[normalizeCode(item.code)] = { supplier: s.name, cost: item.cost };
  return map;
}
function showMsg(text, isOk) {
  const el = document.getElementById("editMsg");
  el.textContent = text;
  el.className = "msg " + (isOk ? "ok" : "err");
  el.style.display = "block";
  setTimeout(() => { el.style.display = "none"; }, 2500);
}

function switchTab(t) {
  document.getElementById("tab-calc").style.display = t === "calc" ? "block" : "none";
  document.getElementById("tab-edit").style.display = t === "edit" ? "block" : "none";
  document.querySelectorAll(".tab").forEach((el, i) => {
    el.className = "tab " + ((i === 0) === (t === "calc") ? "active" : "inactive");
  });
  if (t === "edit") renderEditTab();
}

function handleFiles(input) {
  const newFiles = Array.from(input.files);
  for (const f of newFiles)
    if (!uploadedFiles.find(x => x.file.name === f.name))
      uploadedFiles.push({ file: f, shop: null });
  input.value = "";
  renderFileList();
}

function parseFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type: "array" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });

        if (!rows || rows.length < 2) return reject(new Error("Файл пустой"));

        // Find header row: contains "Код номенкл."
        let headerIdx = -1, codeCol = -1, qtyCol = -1;
        for (let i = 0; i < Math.min(rows.length, 10); i++) {
          for (let j = 0; j < rows[i].length; j++) {
            if (String(rows[i][j] || "").trim() === "Код номенкл.") {
              headerIdx = i;
              codeCol = j;
              break;
            }
          }
          if (headerIdx !== -1) break;
        }
        if (headerIdx === -1) return reject(new Error("Не найдена колонка 'Код номенкл.'"));

        // Find last "Кол-во" = Итого qty; also find nameCol dynamically
        const headerRow = rows[headerIdx];
        let nameCol = -1;
        for (let j = 0; j < headerRow.length; j++) {
          const v = String(headerRow[j] || "").trim();
          if (v === "Кол-во") qtyCol = j; // last = Итого
          if (v === "Наименование") nameCol = j;
        }
        if (qtyCol === -1) return reject(new Error("Не найдена колонка 'Кол-во'"));
        // fallback: name is whichever of col 0/1 is not codeCol
        if (nameCol === -1) nameCol = codeCol === 0 ? 1 : 0;

        const sales = {}, names = {};

        for (let i = headerIdx + 1; i < rows.length; i++) {
          const row = rows[i];
          const rawCode = String(row[codeCol] || "").trim();
          // Skip rows without a numeric code (group headers, empty rows)
          if (!rawCode || !/^[0-9]+$/.test(rawCode)) continue;
          const qty = parseFloat(row[qtyCol]) || 0;
          if (qty <= 0) continue;
          const code = normalizeCode(rawCode);
          if (!code) continue;
          sales[code] = (sales[code] || 0) + qty;
          if (!names[code]) {
            names[code] = String(row[nameCol] || "").trim();
          }
        }

        resolve({ sales, names });
      } catch(err) { reject(err); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

async function calculate() {
  if (!uploadedFiles.every(f => f.shop)) return;
  const errEl=document.getElementById("errorMsg"), resEl=document.getElementById("results");
  errEl.style.display="none";
  resEl.innerHTML='<div style="color:#4a7fa5;text-align:center;padding:20px">Считаю...</div>';
  openDetails={};

  try {
    const lookup = buildLookup();
    // data[supplier][shop] = { total, items: {code: {qty, cost, sum}} }
    const data = {};
    const unknown = [];
    const loadedShops = uploadedFiles.map(f => f.shop);

    for (const {file, shop} of uploadedFiles) {
      let parsed;
      try { parsed = await parseFile(file); }
      catch(e) {
        errEl.textContent="Ошибка файла "+file.name+": "+e.message;
        errEl.style.display="block"; resEl.innerHTML=""; return;
      }
      const {sales, names} = parsed;
      for (const [code, qty] of Object.entries(sales)) {
        if (lookup[code]) {
          const {supplier, cost} = lookup[code];
          if (!data[supplier]) data[supplier]={};
          if (!data[supplier][shop]) data[supplier][shop]={total:0, items:{}};
          const sum = qty*cost;
          data[supplier][shop].total += sum;
          if (!data[supplier][shop].items[code]) data[supplier][shop].items[code]={qty:0,cost,sum:0,name:names[code]||""};
          data[supplier][shop].items[code].qty += qty;
          data[supplier][shop].items[code].sum += sum;
          if (!data[supplier][shop].items[code].name && names[code]) data[supplier][shop].items[code].name=names[code];
        } else {
          if (!unknown.includes(code)) unknown.push(code);
        }
      }
    }

    window._calcData = { data, unknown, loadedShops };
    renderResults(data, unknown, loadedShops);
  } catch(e) {
    errEl.textContent="Ошибка: "+e.message;
    errEl.style.display="block"; resEl.innerHTML="";
  }
}

      if (!allCodes[code]) allCodes[code]={cost:d.cost, name:d.name||"", shops:{}};
      if (!allCodes[code].name && d.name) allCodes[code].name = d.name;
      allCodes[code].shops[sh]={qty:d.qty, sum:d.sum};
    }

  return Object.entries(allCodes).map(([code, d]) => {
    let totalSum=0;

      const s=d.shops[sh];

async function loadFromStorage() {
  try {
    const resp = await fetch(SERVER_URL + '/suppliers');
    const data = await resp.json();
    if (data.ok && data.suppliers && data.suppliers.length > 0) {
      suppliers = data.suppliers;
      return true;
    }
  } catch(e) {
    console.log('Load from server failed, trying localStorage', e);
  }
  // Fallback to localStorage
  try {
    const saved = localStorage.getItem('suppliers_data');
    if (saved) { suppliers = JSON.parse(saved); return true; }
  } catch(e) {}
  return false;
}

// ── COPY TO EXCEL ────────────────────────────────────────────────────────────
function copyToExcel() {
  const d = window._calcData;
  if (!d) return;
  const { data, loadedShops } = d;
  const activeShops = ["Чорсу","Кадышева","Самарканд"].filter(s => loadedShops.includes(s));
  const supNames = suppliers.map(s => s.name);

  // Build tab-separated rows: one row per supplier
  // Columns: Чорсу | Кадышева | Самарканд (only loaded shops, in order)
  const rows = supNames.map(sup => {
    return activeShops.map(sh => {
      const v = data[sup] && data[sup][sh] ? data[sup][sh].total : 0;
      return v > 0 ? Math.round(v) : ""; // empty if no sales
    }).join("\t");
  });

  // Add итого row
  const totRow = activeShops.map(sh => {
    let t = 0;
    for (const sup of supNames) t += (data[sup]&&data[sup][sh]?data[sup][sh].total:0)||0;
    return t > 0 ? Math.round(t) : "";
  }).join("\t");
  rows.push(totRow);

  const text = rows.join("\n");

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector("button[onclick=\"copyToExcel()\"]");
    if (btn) { btn.textContent = "✓ Скопировано! Вставьте в Excel (Ctrl+V)"; setTimeout(()=>{ btn.innerHTML = "📋 Скопировать для Excel"; }, 3000); }
  }).catch(() => {
    // fallback
    const ta = document.createElement("textarea");
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    alert("Скопировано! Вставьте в Excel (Ctrl+V)");
  });
}

  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  sun.setHours(23,59,59,999);
  const fmt = d => d.toISOString().split('T')[0];
  const sd = document.getElementById('apiStartDate');
  const ed = document.getElementById('apiEndDate');
  if (sd) sd.value = fmt(mon);
  if (ed) ed.value = fmt(sun);
})();

async function regosFetch(endpoint, method, payload) {
  const resp = await fetch(PROXY_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      endpoint: endpoint + "/v1/" + method,
      payload: payload
    })
  });
  const data = await resp.json();
  return data;
}

async function loadAllFromApi() {
  const startInput = document.getElementById('apiStartDate').value;
  const endInput = document.getElementById('apiEndDate').value;
  const statusEl = document.getElementById('apiStatus');

  if (!startInput || !endInput) {
    statusEl.textContent = "⚠ Укажите период";
    statusEl.style.color = "#e88060";
    return;
  }

  const startDate = Math.floor(new Date(startInput + 'T00:00:00').getTime() / 1000);
  const endDate = Math.floor(new Date(endInput + 'T23:59:59').getTime() / 1000);

  // Check max 1 month
  if (endDate - startDate > 31 * 86400) {
    statusEl.textContent = "⚠ Период не должен превышать 1 месяц";
    statusEl.style.color = "#e88060";
    return;
  }

  statusEl.style.color = "#4a7fa5";
  statusEl.textContent = "Загружаю кассы...";

  try {
    // Step 1: Get cashes for Tashkent
    const cashResp = await regosFetch(REGOS_TASHKENT, "operatingcash/get", {});
    if (!cashResp.ok) throw new Error("Ошибка получения касс: " + JSON.stringify(cashResp.result));

    const cashes = cashResp.result || [];
    statusEl.textContent = `Найдено ${cashes.length} касс в Ташкенте. Загружаю продажи...`;

    // Group cashes by stock name
    const stockMap = {};
    for (const c of cashes) {
      const sname = c.stock && c.stock.name ? c.stock.name : "Неизвестно";
      if (!stockMap[sname]) stockMap[sname] = [];
      stockMap[sname].push(c.id);
    }

    // Map stock names to our shop names
    // Yoyo = Чорсу, Kilo family outlet = Кадышева
    const shopMapping = {};
    for (const [sname, ids] of Object.entries(stockMap)) {
      const lower = sname.toLowerCase();
      if (lower.includes('yoyo') || lower.includes('йойо') || lower.includes('чорсу')) {
        shopMapping['Чорсу'] = ids;
      } else if (lower.includes('kilo') || lower.includes('кило') || lower.includes('кадыш')) {
        shopMapping['Кадышева'] = ids;
      }
    }

    // Step 2: Load sales for each Tashkent shop
    const apiData = {};
    const apiNames = {};

    for (const [shopName, cashIds] of Object.entries(shopMapping)) {
      statusEl.textContent = `Загружаю ${shopName}...`;
      let offset = 0;
      let allItems = [];
      while (true) {
        const r = await regosFetch(REGOS_TASHKENT, "retailreport/operations", {
          operating_cash_ids: cashIds,
          start_date: startDate,
          end_date: endDate,
          limit: 100,
          offset: offset
        });
        if (!r.ok) break;
        const items = r.result || [];
        allItems = allItems.concat(items);
        if (items.length < 100) break;
        offset += 100;
      }
      apiData[shopName] = allItems;
    }

    // Step 3: Load Samarkand
    statusEl.textContent = "Загружаю Самарканд...";
    let samOffset = 0, samItems = [];
    while (true) {
      const r = await regosFetch(REGOS_SAMARKAND, "retailreport/operations", {
        start_date: startDate,
        end_date: endDate,
        limit: 100,
        offset: samOffset
      });
      if (!r.ok) break;
      const items = r.result || [];
      samItems = samItems.concat(items);
      if (items.length < 100) break;
      samOffset += 100;
    }
    apiData['Самарканд'] = samItems;

    statusEl.textContent = `✓ Загружено: Чорсу ${(apiData['Чорсу']||[]).length} товаров, Кадышева ${(apiData['Кадышева']||[]).length}, Самарканд ${samItems.length}`;
    statusEl.style.color = "#8ab870";

    // Step 4: Calculate using our supplier list
    processApiData(apiData);

  } catch(e) {
    statusEl.textContent = "Ошибка: " + e.message;
    statusEl.style.color = "#e88080";
    console.error(e);
  }
}

function processApiData(apiData) {
  const lookup = buildLookup();
  const data = {};
  const unknown = [];
  const loadedShops = Object.keys(apiData);

  for (const [shop, items] of Object.entries(apiData)) {
    for (const item of items) {
      const rawCode = String(item.item && item.item.code ? item.item.code : "").trim();
      if (!rawCode) continue;
      const code = normalizeCode(rawCode);
      if (!code) continue;

      // net quantity = sales - returns
      const qty = (item.sale_quantity || 0) - (item.return_quantity || 0);
      if (qty <= 0) continue;

      const name = item.item && item.item.name ? item.item.name : "";

      if (lookup[code]) {
        const {supplier, cost} = lookup[code];
        const sum = qty * cost;
        if (!data[supplier]) data[supplier] = {};
        if (!data[supplier][shop]) data[supplier][shop] = {total:0, items:{}};
        data[supplier][shop].total += sum;
        if (!data[supplier][shop].items[code]) data[supplier][shop].items[code] = {qty:0, cost, sum:0, name};
        data[supplier][shop].items[code].qty += qty;
        data[supplier][shop].items[code].sum += sum;
      } else {
        if (!unknown.includes(code)) unknown.push(code);
      }
    }
  }

  window._calcData = { data, unknown, loadedShops };
  renderResults(data, unknown, loadedShops);

  // Clear file uploads
  uploadedFiles = [];
  renderFileList();
}

// ── BONASERA LOGIC ────────────────────────────────────────────────────────────
const BONASERA_EP = "https://integration.regos.uz/gateway/out/9011d723112b4dfe86f41839fdf603f7";
const BONASERA_STOCKS = {
  "Согдиана": [4, 5, 17, 18],
  "Узбекистанская": [6, 13, 14, 15],
  "Bonasera Men": [10, 12, 16]
};

// Extract cost from item name: last 3 digits of number × 1000
// e.g. "Дет комп 126027" -> 27000, "Дет трусы 12605" -> 5000
function extractCost(name) {
  const match = name.match(/(\d{4,6})\s*$/);
  if (!match) return null;
  const num = match[1];
  let digits;
  if (num.length >= 6) digits = parseInt(num.slice(-3), 10);      // 126027 -> 027 -> 27
  else if (num.length === 5) digits = parseInt(num.slice(-2), 10); // 12605 -> 05 -> 5
  else digits = parseInt(num.slice(-3), 10);                       // 4-digit -> last 3
  if (isNaN(digits) || digits === 0) return null;
  return digits * 1000;
}

function isGolibItem(item) {
  if (!item || !item.group) return false;
  return (item.group.path || '').toLowerCase().includes('голиб ака шт');
}

function isBonasens(item) {
  if (!item) return false;
  return (item.name || '').toLowerCase().includes('bonasens');
}

// Get closed months from API -> Set of "YYYY-MM" strings
async function getClosedMonths() {
  const closed = new Set();
  let offset = 0;
  while (true) {
    const r = await regosFetch(BONASERA_EP, "docperiodclosing/get", { limit: 50, offset });
    if (!r.ok || !r.result || r.result.length === 0) break;
    for (const rec of r.result) {
      if (rec.status_id === 4) { // Closed
        const d = new Date(rec.close_date * 1000);
        closed.add(`${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}`);
      }
    }
    if (r.result.length < 50) break;
    offset += 50;
  }
  return closed;
}

// Split date range into monthly chunks
function splitByMonth(startTs, endTs) {
  const chunks = [];
  let cur = new Date(startTs * 1000);
  cur.setUTCDate(1); cur.setUTCHours(0,0,0,0);

  const endDate = new Date(endTs * 1000);

  while (cur <= endDate) {
    const year = cur.getUTCFullYear();
    const month = cur.getUTCMonth();
    const chunkStart = Math.max(startTs, Math.floor(cur.getTime()/1000));
    const lastDay = new Date(Date.UTC(year, month+1, 0, 23, 59, 59));
    const chunkEnd = Math.min(endTs, Math.floor(lastDay.getTime()/1000));
    chunks.push({
      monthKey: `${year}-${String(month+1).padStart(2,'0')}`,
      start: chunkStart,
      end: chunkEnd
    });
    cur = new Date(Date.UTC(year, month+1, 1));
  }
  return chunks;
}

// Choose cost: if month is closed, compare system vs code cost
// system cost = sale_amount / sale_quantity (average unit cost from Regos)
function chooseCost(item, saleAmount, saleQty, isClosed) {
  const name = item.name || '';

  // BONASENS - always use system cost
  if (isBonasens(item)) {
    return saleQty > 0 ? saleAmount / saleQty : 0;
  }

  const codeCost = extractCost(name);

  // Not closed - always use code
  if (!isClosed) return codeCost || 0;

  // Closed - compare
  if (!codeCost) return saleQty > 0 ? saleAmount / saleQty : 0;
  const sysCost = saleQty > 0 ? saleAmount / saleQty : 0;
  const diff = Math.abs(sysCost - codeCost);
  return diff < 5000 ? sysCost : codeCost;
}

async function loadBonasera() {
  const startInput = document.getElementById('bonStartDate').value;
  const endInput = document.getElementById('bonEndDate').value;
  const statusEl = document.getElementById('bonStatus');
  const resEl = document.getElementById('bonResults');

  if (!startInput || !endInput) {
    statusEl.textContent = "⚠ Укажите период";
    statusEl.style.color = "#e88060";
    return;
  }

  const startDate = Math.floor(new Date(startInput + 'T00:00:00').getTime() / 1000);
  const endDate = Math.floor(new Date(endInput + 'T23:59:59').getTime() / 1000);

  statusEl.style.color = "#4a7fa5";
  resEl.innerHTML = '';

  // Step 1: Get closed months
  statusEl.textContent = "Проверяю закрытые периоды...";
  const closedMonths = await getClosedMonths();

  // Step 2: Split period by months
  const chunks = splitByMonth(startDate, endDate);

  // Step 3: For each stock, load data per month chunk
  const stockResults = {};
  let totalQty = 0, totalRevenue = 0, totalCost = 0;

  for (const [stockName, cashIds] of Object.entries(BONASERA_STOCKS)) {
    const itemMap = {}; // itemId -> accumulated data

    for (const chunk of chunks) {
      const isClosed = closedMonths.has(chunk.monthKey);
      statusEl.textContent = `Загружаю ${stockName} (${chunk.monthKey}, ${isClosed ? 'закрыт' : 'открыт'})...`;

      let offset = 0;
      while (true) {
        const r = await regosFetch(BONASERA_EP, "retailreport/operations", {
          operating_cash_ids: cashIds,
          start_date: chunk.start,
          end_date: chunk.end,
          limit: 100,
          offset
        });
        if (!r.ok) break;
        const items = (r.result || []).filter(i => isGolibItem(i.item));

        for (const rec of items) {
          const netQty = (rec.sale_quantity || 0) - (rec.return_quantity || 0);
          if (netQty <= 0) continue;
          const netRevenue = (rec.sale_amount || 0) - (rec.return_amount || 0);

          // Calculate cost for this chunk
          const unitCost = chooseCost(rec.item, rec.sale_amount || 0, rec.sale_quantity || 0, isClosed);
          const costTotal = unitCost * netQty;

          const key = rec.item.id + '_' + chunk.monthKey;
          if (!itemMap[key]) {
            itemMap[key] = {
              name: rec.item.name,
              qty: 0, revenue: 0, cost: 0,
              unitCost,
              monthKey: chunk.monthKey,
              isClosed
            };
          }
          itemMap[key].qty += netQty;
          itemMap[key].revenue += netRevenue;
          itemMap[key].cost += costTotal;
        }

        if ((r.result || []).length < 100) break;
        offset += 100;
      }
    }

    // Aggregate
    let qty = 0, revenue = 0, cost = 0;
    const itemDetails = Object.values(itemMap);
    for (const d of itemDetails) { qty += d.qty; revenue += d.revenue; cost += d.cost; }

    stockResults[stockName] = { qty, revenue, cost, profit: revenue - cost, items: itemDetails };
    totalQty += qty;
    totalRevenue += revenue;
    totalCost += cost;
  }

  const totalProfit = totalRevenue - totalCost;
  const totalMargin = totalRevenue > 0 ? (totalProfit / totalRevenue * 100).toFixed(1) : 0;

  statusEl.textContent = `✓ Готово: ${totalQty} шт, выручка ${fmt(totalRevenue)} сум`;
  statusEl.style.color = "#8ab870";

  renderBonasera(stockResults, totalQty, totalRevenue, totalCost, totalProfit, totalMargin);
}

                  </div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }

  resEl.innerHTML = html;
}
